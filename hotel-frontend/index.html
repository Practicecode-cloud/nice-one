<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Aurelia — Hotel Management System</title>
    <meta
      name="description"
      content="Live operations dashboard and full CRUD console for the Grand Aurelia Hotel Management System."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏨</text></svg>"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- =====================================================================
     HORIZONTAL TOP NAVBAR
     ===================================================================== -->
    <header class="navbar">
      <div class="navbar__inner">
        <a href="#" class="brand" id="brand-link">
          <span class="brand__mark">🏨</span>
          <span class="brand__text">
            <strong>Grand Aurelia</strong>
            <small>Hotel Management System</small>
          </span>
        </a>

        <button
          class="nav-mobile-toggle"
          id="nav-mobile-toggle"
          aria-label="Toggle navigation"
        >
          ☰
        </button>

        <nav class="nav-groups-wrap" id="nav-groups-wrap">
          <a href="#" class="nav-link is-active" id="nav-dashboard"
            ><span>📊</span> Dashboard</a
          >
          <div class="nav-groups" id="nav-groups"><!-- built by app.js --></div>
        </nav>

        <div class="global-search">
          <span class="global-search__icon">⌕</span>
          <input
            type="text"
            id="global-search"
            placeholder="Search guests, rooms, reservations…"
            autocomplete="off"
          />
          <div class="search-results" id="global-search-results"></div>
        </div>
      </div>
    </header>

    <!-- =====================================================================
     MAIN CONTENT (Dashboard / Module views injected here by JS)
     ===================================================================== -->
    <main id="app-content" class="app-content">
      <div class="boot-loading">Loading Grand Aurelia…</div>
    </main>

    <footer class="site-footer">
      <p>
        Grand Aurelia Hotel Management System · Frontend console for a 16-table
        Node/Express + PostgreSQL backend.
      </p>
    </footer>

    <!-- =====================================================================
     ADD / EDIT MODAL
     ===================================================================== -->
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- =====================================================================
     SCRIPTS — Chart.js from CDN, then app modules in dependency order
     ===================================================================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/render.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
